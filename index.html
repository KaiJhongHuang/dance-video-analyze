<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>舞蹈練習播放器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            font-size: 1.6rem;
            margin-bottom: 20px;
            color: #e94560;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        /* Draggable sections */
        .draggable-section {
            margin-bottom: 20px;
            transition: transform 0.15s, opacity 0.15s;
        }

        .draggable-section.dragging {
            opacity: 0.5;
            transform: scale(0.98);
        }

        .draggable-section.drag-over {
            border-top: 3px solid #e94560;
        }

        .drag-handle {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: grab;
            user-select: none;
        }

        .drag-handle:active {
            cursor: grabbing;
        }

        .drag-icon {
            font-size: 0.9rem;
            color: #555;
            letter-spacing: 2px;
        }

        .video-wrapper.mirrored iframe,
        .video-wrapper.mirrored video {
            transform: scaleX(-1);
        }

        /* Fullscreen mode */
        .fullscreen-mode {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 10000;
            display: flex;
            flex-direction: column;
        }

        .fullscreen-mode .video-wrapper {
            flex: 1;
            padding-bottom: 0;
            border-radius: 0;
        }

        .fullscreen-mode .video-wrapper iframe {
            width: 100%;
            height: 100%;
        }

        .fullscreen-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.85));
            padding: 15px 20px;
            padding-bottom: calc(15px + env(safe-area-inset-bottom, 20px));
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            z-index: 10001;
        }

        .fullscreen-overlay .btn {
            font-size: 0.85rem;
            padding: 6px 14px;
        }

        .beat-watermark {
            position: absolute;
            bottom: 30px;
            right: 30px;
            z-index: 100;
            text-align: right;
            pointer-events: none;
            opacity: 0.85;
        }

        .fullscreen-mode .beat-watermark {
            z-index: 10001;
            bottom: calc(80px + env(safe-area-inset-bottom, 20px));
            right: 40px;
        }

        .beat-watermark-big {
            font-size: 3rem;
            font-weight: bold;
            color: #e94560;
            line-height: 1;
            text-shadow: 0 2px 8px rgba(0,0,0,0.7);
        }

        .fullscreen-mode .beat-watermark-big {
            font-size: 4rem;
        }

        .beat-watermark-sub {
            font-size: 0.85rem;
            color: #ccc;
            text-shadow: 0 1px 4px rgba(0,0,0,0.7);
        }


        /* Video Section */
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Panels */
        .panel {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
        }

        .panel h2 {
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: #e94560;
        }

        .settings-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .field label {
            font-size: 0.85rem;
            color: #aaa;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .field input, .field select {
            background: #0f3460;
            border: 1px solid #333;
            color: #eee;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 1rem;
            width: 120px;
        }

        .field input:focus, .field select:focus {
            outline: none;
            border-color: #e94560;
        }

        /* Info tooltip */
        .info-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #0f3460;
            color: #888;
            font-size: 0.65rem;
            cursor: help;
            position: relative;
            flex-shrink: 0;
        }

        .info-icon .tooltip {
            display: none;
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%);
            background: #0a1628;
            border: 1px solid #333;
            color: #ccc;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            white-space: nowrap;
            z-index: 100;
            line-height: 1.5;
            font-weight: normal;
        }

        .info-icon .tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 6px solid transparent;
            border-top-color: #333;
        }

        .info-icon:hover .tooltip {
            display: block;
        }

        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-primary {
            background: #e94560;
            color: #fff;
        }

        .btn-primary:hover {
            background: #c73e54;
        }

        .btn-secondary {
            background: #0f3460;
            color: #eee;
            border: 1px solid #444;
        }

        .btn-secondary:hover {
            background: #1a4a8a;
        }

        .btn-active {
            background: #e94560 !important;
            border-color: #e94560 !important;
        }

        /* URL input */
        .url-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .url-row input {
            flex: 1;
            width: auto;
        }

        /* Beat Timeline Slider */
        .beat-slider-group {
            margin-bottom: 18px;
        }

        .beat-slider-header {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
            margin-bottom: 8px;
        }

        .beat-slider-header:hover .beat-slider-label {
            color: #bbb;
        }

        .beat-slider-toggle {
            font-size: 0.75rem;
            color: #888;
            transition: transform 0.2s;
        }

        .beat-slider-toggle.collapsed {
            transform: rotate(-90deg);
        }

        .beat-slider-label {
            font-size: 0.8rem;
            color: #888;
            transition: color 0.15s;
        }

        .beat-slider-body.collapsed {
            display: none;
        }

        .beat-slider-track {
            position: relative;
            width: 100%;
            height: 14px;
            background: #0f3460;
            border-radius: 6px;
            cursor: pointer;
            user-select: none;
        }

        .beat-slider-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: linear-gradient(90deg, #e94560, #c73e54);
            border-radius: 6px 0 0 6px;
            pointer-events: none;
        }

        .beat-slider-thumb {
            position: absolute;
            top: -3px;
            width: 4px;
            height: 20px;
            background: #fff;
            border-radius: 2px;
            pointer-events: none;
            transform: translateX(-2px);
            box-shadow: 0 0 6px rgba(233,69,96,0.6);
        }

        .beat-tick {
            position: absolute;
            top: 0;
            width: 1px;
            height: 100%;
            background: rgba(255,255,255,0.15);
            pointer-events: none;
        }

        .beat-tick.first-of-group {
            background: rgba(255,255,255,0.35);
            width: 2px;
        }

        .beat-tick-label {
            position: absolute;
            top: 100%;
            transform: translateX(-50%);
            font-size: 0.65rem;
            color: #666;
            margin-top: 3px;
            pointer-events: none;
        }

        .beat-tick-label.active {
            color: #e94560;
            font-weight: bold;
        }

        /* Controls */
        .controls-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .controls-row .btn {
            font-size: 1.1rem;
            padding: 10px 18px;
        }

        .speed-slider-wrap {
            position: relative;
            margin-top: 20px;
            margin-bottom: 15px;
        }

        .speed-slider-track {
            position: relative;
            width: 100%;
            height: 14px;
            background: #0f3460;
            border-radius: 6px;
            cursor: pointer;
            user-select: none;
        }

        .speed-slider-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: linear-gradient(90deg, #16213e, #e94560);
            border-radius: 6px 0 0 6px;
            pointer-events: none;
        }

        .speed-slider-thumb {
            position: absolute;
            top: -3px;
            width: 4px;
            height: 20px;
            background: #fff;
            border-radius: 2px;
            pointer-events: none;
            transform: translateX(-2px);
            box-shadow: 0 0 6px rgba(233,69,96,0.6);
        }

        .speed-tick {
            position: absolute;
            top: 0;
            width: 1px;
            height: 100%;
            background: rgba(255,255,255,0.15);
            pointer-events: none;
        }

        .speed-tick.active-tick {
            width: 2px;
            background: rgba(255,255,255,0.4);
        }

        .speed-label-top {
            position: absolute;
            bottom: 100%;
            transform: translateX(-50%);
            font-size: 0.6rem;
            color: #888;
            margin-bottom: 2px;
            pointer-events: none;
            white-space: nowrap;
        }

        .speed-label-top.active-tick {
            color: #e94560;
            font-weight: bold;
        }

        .speed-label-bottom {
            position: absolute;
            top: 100%;
            transform: translateX(-50%);
            font-size: 0.6rem;
            color: #666;
            margin-top: 3px;
            pointer-events: none;
            white-space: nowrap;
        }

        .speed-label-bottom.active-tick {
            color: #e94560;
            font-weight: bold;
        }

        .capture-btn {
            padding: 4px 8px;
            font-size: 0.8rem;
            flex-shrink: 0;
        }



        /* Progress bar */
        .progress-bar-container {
            width: 100%;
            height: 14px;
            background: #0f3460;
            border-radius: 6px;
            margin-top: 16px;
            margin-bottom: 6px;
            cursor: pointer;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: #e94560;
            border-radius: 6px;
            width: 0%;
            transition: width 0.1s linear;
        }

        .progress-group-tick {
            position: absolute;
            top: 0;
            width: 2px;
            height: 100%;
            background: rgba(255,255,255,0.3);
            pointer-events: none;
            z-index: 1;
        }

        .progress-group-label {
            position: absolute;
            bottom: 100%;
            transform: translateX(-50%);
            font-size: 0.6rem;
            color: #666;
            margin-bottom: 2px;
            pointer-events: none;
        }

        .current-time {
            text-align: center;
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 15px;
        }

        /* Keyboard hints */
        .keyboard-hints {
            background: #16213e;
            border-radius: 12px;
            padding: 15px 20px;
            font-size: 0.8rem;
            color: #666;
        }

        .keyboard-hints h3 {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 8px;
        }

        .keyboard-hints kbd {
            background: #0f3460;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
            color: #aaa;
        }

        .hint-row {
            margin-bottom: 4px;
        }

        /* Responsive - mobile */
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }

            h1 {
                font-size: 1.3rem;
                margin-bottom: 12px;
            }

            .panel {
                padding: 14px;
            }

            .panel h2 {
                font-size: 0.95rem;
                margin-bottom: 10px;
            }

            .settings-row {
                flex-direction: column;
                gap: 10px;
                align-items: stretch;
            }

            .settings-row .field {
                width: 100%;
            }

            .settings-row .field input,
            .settings-row .field select {
                width: 100%;
            }

            .settings-row .btn {
                width: 100%;
                text-align: center;
            }

            .btn {
                padding: 6px 14px;
                font-size: 0.85rem;
            }

            .controls-row {
                gap: 8px;
            }

            .controls-row .btn {
                font-size: 0.85rem;
                padding: 8px 12px;
            }

            .speed-label-top, .speed-label-bottom {
                font-size: 0.55rem;
            }

            .capture-btn {
                padding: 4px 6px;
                font-size: 0.7rem;
            }

            .url-row {
                flex-direction: column;
            }

            .url-row input {
                width: 100%;
            }

            .info-icon .tooltip {
                white-space: normal;
                width: 200px;
            }

            .draggable-section {
                margin-bottom: 12px;
            }

            .keyboard-hints {
                padding: 10px 14px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🩰 舞蹈練習播放器</h1>

        <!-- Video -->
        <div class="draggable-section" data-section="video">
            <div class="video-wrapper" id="videoWrapper">
                <div id="ytPlayer"></div>
                <video id="localPlayer" style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; object-fit:contain; background:#000;" playsinline></video>
                <div class="beat-watermark" id="beatWatermark" style="display:none;">
                    <div class="beat-watermark-big" id="wmBeatNum">-</div>
                    <div class="beat-watermark-sub" id="wmBeatSub"></div>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="draggable-section" data-section="controls">
            <div class="panel">
                <h2><span class="drag-handle"><span class="drag-icon">⠿</span> 🎛️ 播放控制</span></h2>
                <div class="progress-bar-container" id="progressBarContainer">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div id="beatsContainer" style="margin-bottom:8px;"></div>
                <div class="current-time" id="currentTimeDisplay">0:00.0</div>

                <div class="controls-row">
                    <button class="btn btn-primary" onclick="togglePlay()" id="playBtn">▶ 播放</button>
                    <button class="btn btn-secondary" id="mirrorBtn" onclick="toggleMirror()">鏡像: OFF</button>
                    <button class="btn btn-secondary" id="watermarkBtn" onclick="toggleWatermark()">數拍: OFF</button>
                    <button class="btn btn-secondary" onclick="toggleFullscreen()">全螢幕</button>
                </div>

                <div class="speed-slider-wrap">
                    <div class="speed-slider-track" id="speedSliderTrack">
                        <div class="speed-slider-fill" id="speedSliderFill"></div>
                        <div class="speed-slider-thumb" id="speedSliderThumb"></div>
                    </div>
                </div>

            </div>
        </div>

        <!-- Settings -->
        <div class="draggable-section" data-section="settings">
            <div class="panel">
                <h2><span class="drag-handle"><span class="drag-icon">⠿</span> ⚙️ 設定</span></h2>
                <div style="display:flex; gap:10px; margin-bottom:15px; flex-wrap:wrap;">
                    <div class="url-row" style="flex:1; min-width:0; margin-bottom:0;">
                        <input type="text" id="videoUrl" placeholder="YouTube 影片網址" value="https://www.youtube.com/watch?v=YQq3KidUqQ0">
                        <button class="btn btn-primary" onclick="loadVideo()">載入</button>
                    </div>
                    <label class="btn btn-secondary" style="cursor:pointer; margin:0; white-space:nowrap;">
                        📁 本機影片
                        <input type="file" id="localFileInput" accept="video/*" style="display:none;" onchange="loadLocalVideo(this)">
                    </label>
                </div>
                <div id="localFileNameWrap" style="display:none; font-size:0.8rem; color:#888; margin:-10px 0 10px 0;">
                    <span id="localFileName"></span>
                </div>
                <div class="settings-row">
                    <div class="field" style="flex:2;">
                        <label>
                            數拍範圍
                            <span class="info-icon">?
                                <span class="tooltip">開始：第 1 個八拍的第 1 拍瞬間<br>結束：最後八拍結束後，假想的「下一拍」瞬間</span>
                            </span>
                        </label>
                        <div style="display:flex; align-items:center; gap:4px;">
                            <button class="btn btn-secondary capture-btn" onclick="captureStartTime()" title="擷取開始時間">▶|</button>
                            <input type="text" id="beatRange" value="0:06.90 ~ 1:49.00" oninput="parseBeatRange()" style="text-align:center; flex:1; min-width:0;">
                            <button class="btn btn-secondary capture-btn" onclick="captureEndTime()" title="擷取結束時間">|◀</button>
                        </div>
                        <input type="hidden" id="startTime" value="6.9">
                        <input type="hidden" id="endTime" value="109.0">
                    </div>
                    <div class="field">
                        <label>八拍組數</label>
                        <input type="number" id="beatCount" value="32" step="1" min="1" oninput="generateBeats()">
                    </div>
                </div>
                <div class="settings-row" style="margin-top:10px;">
                    <div class="field" style="flex:2;">
                        <label>
                            循環範圍
                            <span class="info-icon">?
                                <span class="tooltip">可獨立設定循環的起迄時間，<br>不影響數拍範圍</span>
                            </span>
                        </label>
                        <div style="display:flex; align-items:center; gap:4px;">
                            <button class="btn btn-secondary capture-btn" onclick="captureLoopStart()" title="擷取循環起點">▶|</button>
                            <input type="text" id="loopRange" value="0:06.90 ~ 1:49.00" oninput="parseLoopRange()" style="text-align:center; flex:1; min-width:0;">
                            <button class="btn btn-secondary capture-btn" onclick="captureLoopEnd()" title="擷取循環終點">|◀</button>
                        </div>
                        <input type="hidden" id="loopStartTime" value="6.9">
                        <input type="hidden" id="loopEndTime" value="109.0">
                    </div>
                    <div class="field">
                        <label>循環</label>
                        <button class="btn btn-secondary" id="loopBtn" onclick="toggleLoop()" style="width:100%;">OFF</button>
                    </div>
                </div>
                <div class="settings-row" style="margin-top:10px;">
                    <div class="field">
                        <label>數拍浮水印偏移</label>
                        <div style="display:flex; align-items:center; gap:4px;">
                            <button class="btn btn-secondary capture-btn" onclick="adjustBeatOffset(-0.01)">-</button>
                            <input type="text" id="beatOffsetInput" value="0.00" onchange="setBeatOffsetFromInput()" style="text-align:center; flex:1; min-width:0;">
                            <span style="font-size:0.8rem; color:#888;">s</span>
                            <button class="btn btn-secondary capture-btn" onclick="adjustBeatOffset(0.01)">+</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Beta Features -->
        <div class="panel" style="margin-bottom:20px; border: 1px solid #e9456044;">
            <h2 style="display:flex; align-items:center; gap:8px;">
                🧪 Beta 功能
                <span style="font-size:0.65rem; background:#e94560; color:#fff; padding:2px 8px; border-radius:4px;">BETA</span>
            </h2>
            <div class="controls-row" style="justify-content:flex-start; margin-bottom:0;">
                <button class="btn btn-secondary" id="metronomeBtn" onclick="toggleMetronome()">🥁 節拍器: OFF</button>
                <button class="btn btn-secondary" onclick="shareLink()">🔗 分享連結</button>
                <button class="btn btn-secondary" onclick="openBeatPreview()">📸 八拍預覽</button>
                <button class="btn btn-secondary" id="autoDetectBtn" onclick="autoDetectBeats()" style="display:none;">🎵 自動偵測節拍</button>
            </div>
        </div>

        <!-- Keyboard Hints -->
        <div class="keyboard-hints">
            <h3>⌨️ 鍵盤快捷鍵</h3>
            <div class="hint-row"><kbd>Space</kbd> 播放/暫停</div>
            <div class="hint-row"><kbd>←</kbd> / <kbd>→</kbd> 上/下一拍</div>
            <div class="hint-row"><kbd>Shift+←</kbd> / <kbd>Shift+→</kbd> 上/下一個八拍</div>
            <div class="hint-row"><kbd>L</kbd> 開關循環播放</div>
            <div class="hint-row"><kbd>R</kbd> 回到開始</div>
            <div class="hint-row"><kbd>M</kbd> 鏡像翻轉</div>
            <div class="hint-row"><kbd>-</kbd> / <kbd>+</kbd> 減速/加速</div>
        </div>

        <footer style="text-align:center; padding:20px 0 10px; font-size:0.75rem; color:#555;">
            v1.1 — Kai, built with Claude Code
        </footer>
    </div>

    <script>
        // ==================== Preview Mode ====================
        (function checkPreviewMode() {
            const params = new URLSearchParams(window.location.search);
            if (params.get('preview') !== '1') return;

            const videoId = params.get('vid');
            const groupIdx = params.get('g');
            const beatsStr = params.get('beats');
            if (!videoId || !beatsStr) return;

            const previewBeats = beatsStr.split(',').map(s => {
                const [num, time] = s.split(':');
                return { num: parseInt(num), time: parseFloat(time) };
            });

            // Hide main UI, show preview
            document.querySelector('.container').style.display = 'none';

            const wrapper = document.createElement('div');
            wrapper.style.cssText = 'width:100%; margin:0; padding:0;';
            wrapper.innerHTML = `

                const section = e.target.closest('.draggable-section');

            container.addEventListener('dragover', function(e) {

                const section = e.target.closest('.draggable-section');

                document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));

                e.preventDefault();

                target.classList.remove('drag-over');

                const sections = [...container.querySelectorAll('.draggable-section')];
                const dragIdx = sections.indexOf(draggedEl);
                const dropIdx = sections.indexOf(target);

                if (dragIdx < dropIdx) {
                    target.after(draggedEl);

                touchDragEl = section;

        // ==================== Beat range helpers ====================
        function formatTimeMMSS(seconds) {

        function parseTimeMMSS(str) {
            str = str.trim();

            const parts = str.split(':');
            if (parts.length === 2) {

            return parseFloat(str);

        // ==================== Auto Beat Detection ====================
        async function autoDetectBeats() {
            if (!localFileRef) {
                alert('請先選擇本機影片');
                return;
            }

            const btn = document.getElementById('autoDetectBtn');
            const origText = btn.textContent;
            btn.textContent = '🎵 讀取檔案中...';
            btn.disabled = true;

            // Use setTimeout to let UI update before heavy work
            await new Promise(r => setTimeout(r, 50));

            try {
                // 1. Read file as ArrayBuffer
                const arrayBuffer = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = () => reject(new Error('檔案讀取失敗'));
                    reader.readAsArrayBuffer(localFileRef);
                });

                btn.textContent = '🎵 解碼音頻中...';
                await new Promise(r => setTimeout(r, 50));

                // 2. Decode audio
                const actx = new (window.AudioContext || window.webkitAudioContext)();
                let audioBuffer;
                try {
                    audioBuffer = await actx.decodeAudioData(arrayBuffer);
                } catch (decodeErr) {
                    throw new Error('無法解碼此影片的音頻格式，請嘗試其他影片');
                }

                btn.textContent = '🎵 濾波處理中...';
                await new Promise(r => setTimeout(r, 50));

                // 3. Apply band-pass filter (100-150Hz) via OfflineAudioContext to isolate kick/bass
                const offlineCtx = new OfflineAudioContext(1, audioBuffer.length, audioBuffer.sampleRate);
                const source = offlineCtx.createBufferSource();
                source.buffer = audioBuffer;

                const lowpass = offlineCtx.createBiquadFilter();
                lowpass.type = 'lowpass';
                lowpass.frequency.value = 150;
                lowpass.Q.value = 1;

                const highpass = offlineCtx.createBiquadFilter();
                highpass.type = 'highpass';
                highpass.frequency.value = 100;
                highpass.Q.value = 1;

                source.connect(lowpass);
                lowpass.connect(highpass);
                highpass.connect(offlineCtx.destination);
                source.start(0);

                const filteredBuffer = await offlineCtx.startRendering();
                const data = filteredBuffer.getChannelData(0);
                const sampleRate = filteredBuffer.sampleRate;

                btn.textContent = '🎵 偵測節拍中...';
                await new Promise(r => setTimeout(r, 50));

                // 4. Find peaks in energy (split into ~0.5s chunks)
                const partSize = Math.round(sampleRate * 0.5);
                const numParts = Math.floor(data.length / partSize);
                const peaks = [];

                for (let i = 0; i < numParts; i++) {
                    let max = 0, maxIdx = 0;
                    const offset = i * partSize;
                    for (let j = 0; j < partSize; j++) {
                        const val = Math.abs(data[offset + j]);
                        if (val > max) { max = val; maxIdx = offset + j; }
                    }
                    peaks.push({ position: maxIdx, volume: max });
                }

                // Keep top 50% by volume, re-sort by position
                peaks.sort((a, b) => b.volume - a.volume);
                const kept = peaks.slice(0, Math.ceil(peaks.length * 0.5));
                kept.sort((a, b) => a.position - b.position);

                if (kept.length < 2) {
                    throw new Error('音量太小，無法偵測節拍');
                }

                // 5. Calculate intervals between peaks, build BPM histogram
                const bpmCounts = {};
                for (let i = 0; i < kept.length - 1; i++) {
                    const limit = Math.min(i + 10, kept.length);
                    for (let j = i + 1; j < limit; j++) {
                        let bpm = (60 * sampleRate) / (kept[j].position - kept[i].position);
                        // Normalize to 80-180 BPM range
                        while (bpm < 80) bpm *= 2;
                        while (bpm >= 180) bpm /= 2;
                        const rounded = Math.round(bpm);
                        bpmCounts[rounded] = (bpmCounts[rounded] || 0) + 1;
                    }
                }

                // Find most common BPM
                let detectedBpm = 120;
                let maxCount = 0;
                for (const [bpm, count] of Object.entries(bpmCounts)) {
                    if (count > maxCount) {
                        maxCount = count;
                        detectedBpm = parseInt(bpm);
                    }
                }

                // 6. Find beat phase using the original (unfiltered) audio energy
                const mono = new Float32Array(audioBuffer.length);
                for (let ch = 0; ch < audioBuffer.numberOfChannels; ch++) {
                    const chData = audioBuffer.getChannelData(ch);
                    for (let i = 0; i < audioBuffer.length; i++) mono[i] += chData[i];
                }
                for (let i = 0; i < mono.length; i++) mono[i] /= audioBuffer.numberOfChannels;

                const beatSamples = Math.round((60 / detectedBpm) * sampleRate);
                const windowSz = Math.round(sampleRate * 0.02); // 20ms window for energy
                let bestPhase = 0;
                let bestPhaseScore = -Infinity;

                // Test 50 phase candidates
                const phaseStep = Math.max(1, Math.floor(beatSamples / 50));
                for (let phase = 0; phase < beatSamples; phase += phaseStep) {
                    let score = 0;
                    for (let pos = phase; pos + windowSz < mono.length; pos += beatSamples) {
                        for (let k = 0; k < windowSz; k++) {
                            score += Math.abs(mono[pos + k]);
                        }
                    }
                    if (score > bestPhaseScore) {
                        bestPhaseScore = score;
                        bestPhase = phase;
                    }
                }

                // 7. Generate beat times
                const beatTimes = [];
                for (let pos = bestPhase; pos < mono.length; pos += beatSamples) {
                    beatTimes.push(pos / sampleRate);
                }

                // 8. Find best 8-beat segment near current playback position
                const currentPos = player ? player.getCurrentTime() : 0;
                const duration = player ? player.getDuration() : audioBuffer.duration;

                let nearestBeatIdx = 0;
                let minDist = Infinity;
                for (let i = 0; i < beatTimes.length; i++) {
                    const dist = Math.abs(beatTimes[i] - currentPos);
                    if (dist < minDist) { minDist = dist; nearestBeatIdx = i; }
                }

                const alignedIdx = nearestBeatIdx - (nearestBeatIdx % 8);
                const suggestedStart = beatTimes[alignedIdx] || beatTimes[0] || 0;
                const numGroups = Math.min(3, Math.floor((beatTimes.length - alignedIdx) / 8));
                const endIdx = alignedIdx + numGroups * 8;
                const suggestedEnd = endIdx < beatTimes.length ? beatTimes[endIdx] : duration;

                // 9. Apply results
                document.getElementById('startTime').value = suggestedStart.toFixed(2);
                document.getElementById('endTime').value = suggestedEnd.toFixed(2);
                document.getElementById('beatCount').value = Math.max(1, numGroups);
                updateBeatRangeDisplay();
                generateBeats();

                actx.close();

                btn.textContent = `🎵 BPM: ${Math.round(detectedBpm)}`;
                setTimeout(() => { btn.textContent = origText; btn.disabled = false; }, 3000);

            } catch (err) {
                console.error('Beat detection failed:', err);
                btn.textContent = origText;
                btn.disabled = false;
                alert('節拍偵測失敗：' + err.message);
            }
        }

        // ==================== Beat generation ====================
        function generateBeats() {
            startTime = parseFloat(document.getElementById('startTime').value);
            endTime = parseFloat(document.getElementById('endTime').value);
            const count = parseInt(document.getElementById('beatCount').value);
            const totalBeats = 8 * count;
            const duration = endTime - startTime;
            const beatInterval = duration / totalBeats;

            beats = [];
            for (let i = 0; i < totalBeats; i++) {
                beats.push({
                    index: i,
                    time: startTime + i * beatInterval,
                    beatNumber: (i % 8) + 1,
                    groupIndex: Math.floor(i / 8)
                });
            }

            renderBeats();
            renderProgressGroupMarkers();
            renderSpeedTicks();
        }

        // Render group markers on the main progress bar
        function renderProgressGroupMarkers() {
            // Remove old markers
            document.querySelectorAll('.progress-group-tick, .progress-group-label').forEach(el => el.remove());

            const bar = document.getElementById('progressBarContainer');
            const duration = player.getDuration();
            if (!duration || duration <= 0 || beats.length === 0) return;

            const beatInterval = beats.length > 1 ? beats[1].time - beats[0].time : 0;
            const numGroups = Math.ceil(beats.length / 8);

            // Start marker
            const startPct = (startTime / duration) * 100;
            addProgressTick(bar, startPct, '1');

            // Group boundary markers (2nd group onward)
            for (let g = 1; g < numGroups; g++) {
                const groupStart = startTime + g * 8 * beatInterval;
                const pct = (groupStart / duration) * 100;
                addProgressTick(bar, pct, String(g + 1));
            }

            // End marker
            const endPct = (endTime / duration) * 100;
            addProgressTick(bar, endPct, '');
        }

        function addProgressTick(bar, pct, label) {
            const tick = document.createElement('div');
            tick.className = 'progress-group-tick';
            tick.style.left = pct + '%';
            bar.appendChild(tick);

            if (label) {
                const lbl = document.createElement('div');
                lbl.className = 'progress-group-label';
                lbl.style.left = pct + '%';
                lbl.textContent = label;
                bar.appendChild(lbl);
            }
        }

        // Render a single 8-beat slider with 0.5-beat padding on each side
        function renderBeats() {
            const container = document.getElementById('beatsContainer');
            container.innerHTML = '';

            if (beats.length === 0) return;

            const beatsPerGroup = Math.min(8, beats.length);
            const beatInterval = beats.length > 1 ? beats[1].time - beats[0].time : 0;
            // Total range: 0.5 beat padding on each side → 9 beat-widths total
            const totalSlots = beatsPerGroup + 1; // 9 for 8 beats

            // Single track representing one 8-count cycle
            const track = document.createElement('div');
            track.className = 'beat-slider-track';
            track.id = 'beatSliderTrack';

            const fill = document.createElement('div');
            fill.className = 'beat-slider-fill';
            fill.id = 'beatSliderFill';
            track.appendChild(fill);

            // Tick marks for beats 1-8 (offset by 0.5 beat from left edge)
            for (let i = 0; i < beatsPerGroup; i++) {
                const pct = ((i + 0.5) / totalSlots) * 100;

                const tick = document.createElement('div');
                tick.className = 'beat-tick' + (i === 0 ? ' first-of-group' : '');
                tick.style.left = pct + '%';
                track.appendChild(tick);

                const tickLabel = document.createElement('div');
                tickLabel.className = 'beat-tick-label';
                tickLabel.id = `tick-label-${i}`;
                tickLabel.textContent = i + 1;
                tickLabel.style.left = pct + '%';
                track.appendChild(tickLabel);
            }

            // Thumb
            const thumb = document.createElement('div');
            thumb.className = 'beat-slider-thumb';
            thumb.id = 'beatSliderThumb';
            track.appendChild(thumb);

            // Click/drag to seek within current 8-count
            function seekFromEvent(e) {
                const rect = track.getBoundingClientRect();
                const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
                // Map slider ratio back to time: ratio covers -0.5 to 8.5 beats
                const beatPos = ratio * totalSlots - 0.5; // -0.5 to 8.5
                const clampedPos = Math.max(0, Math.min(beatsPerGroup, beatPos));
                const groupIdx = currentBeatIndex >= 0 ? beats[currentBeatIndex].groupIndex : 0;
                const groupStart = startTime + groupIdx * beatsPerGroup * beatInterval;
                const time = groupStart + clampedPos * beatInterval;
                if (player) player.seekTo(time, true);
            }

            let isDragging = false;
            track.addEventListener('mousedown', (e) => { isDragging = true; seekFromEvent(e); e.preventDefault(); });
            document.addEventListener('mousemove', (e) => { if (isDragging) seekFromEvent(e); });
            document.addEventListener('mouseup', () => { isDragging = false; });
            track.addEventListener('touchstart', (e) => { isDragging = true; seekFromEvent(e.touches[0]); e.preventDefault(); }, { passive: false });
            document.addEventListener('touchmove', (e) => { if (isDragging) seekFromEvent(e.touches[0]); }, { passive: false });
            document.addEventListener('touchend', () => { isDragging = false; });

            container.appendChild(track);
        }

        // ==================== Navigation ====================
        function jumpToBeat(index) {
            if (index < 0 || index >= beats.length || !player) return;
            currentBeatIndex = index;
            player.seekTo(beats[index].time, true);
            highlightBeat(index);
        }

        function jumpBeats(n) {
            if (beats.length === 0) {
                if (!player) return;
                const current = player.getCurrentTime();
                player.seekTo(Math.max(0, current + n * 0.5), true);
                return;
            }
            const newIndex = Math.max(0, Math.min(beats.length - 1, currentBeatIndex + n));
            jumpToBeat(newIndex);
        }

        function highlightBeat(index) {
            if (beats.length === 0 || index < 0) return;
            const beatNum = beats[index].beatNumber - 1; // 0-based
            document.querySelectorAll('.beat-tick-label').forEach(el => el.classList.remove('active'));
            const tickLabel = document.getElementById(`tick-label-${beatNum}`);
            if (tickLabel) tickLabel.classList.add('active');
        }

        function updateSliderPositions(currentTime) {
            if (beats.length === 0) return;
            const beatsPerGroup = Math.min(8, beats.length);
            const beatInterval = beats.length > 1 ? beats[1].time - beats[0].time : 0;
            const groupDuration = beatsPerGroup * beatInterval;
            const totalSlots = beatsPerGroup + 1; // 9 for 8 beats

            // Find position within current group (in beats: 0 to beatsPerGroup)
            const elapsed = currentTime - startTime;
            const beatPos = groupDuration > 0 ? (elapsed % groupDuration) / beatInterval : 0;
            // Map beat position to slider percentage with 0.5 padding
            const pct = ((beatPos + 0.5) / totalSlots) * 100;
            const clamped = Math.max(0, Math.min(100, pct));

            const fill = document.getElementById('beatSliderFill');
            const thumb = document.getElementById('beatSliderThumb');
            if (fill) fill.style.width = clamped + '%';
            if (thumb) thumb.style.left = clamped + '%';
        }

        function togglePlay() {
            if (!player) return;
            const state = player.getPlayerState();
            if (state === 1) { // 1 = PLAYING
                player.pauseVideo();
            } else {
                player.playVideo();
            }
        }

        let loopStartTime = 6.9;
        let loopEndTime = 109.0;

        function toggleLoop() {
            isLooping = !isLooping;
            const btn = document.getElementById('loopBtn');
            btn.textContent = isLooping ? 'ON' : 'OFF';
            btn.classList.toggle('btn-active', isLooping);
        }

        function updateLoopRangeDisplay() {
            const s = parseFloat(document.getElementById('loopStartTime').value) || 0;
            const e = parseFloat(document.getElementById('loopEndTime').value) || 0;
            document.getElementById('loopRange').value = `${formatTimeMMSS(s)} ~ ${formatTimeMMSS(e)}`;
        }

        function parseLoopRange() {
            const val = document.getElementById('loopRange').value;
            const parts = val.split('~');
            if (parts.length !== 2) return;
            const s = parseTimeMMSS(parts[0]);
            const e = parseTimeMMSS(parts[1]);
            if (!isNaN(s)) { document.getElementById('loopStartTime').value = s; loopStartTime = s; }
            if (!isNaN(e)) { document.getElementById('loopEndTime').value = e; loopEndTime = e; }
        }

        function captureLoopStart() {
            if (!player || !player.getCurrentTime) return;
            const time = parseFloat(player.getCurrentTime().toFixed(2));
            document.getElementById('loopStartTime').value = time;
            loopStartTime = time;
            updateLoopRangeDisplay();
        }

        function captureLoopEnd() {
            if (!player || !player.getCurrentTime) return;
            const time = parseFloat(player.getCurrentTime().toFixed(2));
            document.getElementById('loopEndTime').value = time;
            loopEndTime = time;
            updateLoopRangeDisplay();
        }

        function jumpToStart() {
            if (!player) return;
            player.seekTo(startTime, true);
            currentBeatIndex = 0;
            if (beats.length > 0) highlightBeat(0);
        }

        let baseBpm = 0;

        function calcBpm() {
            const duration = endTime - startTime;
            const count = parseInt(document.getElementById('beatCount').value) || 0;
            if (duration <= 0 || count <= 0) { baseBpm = 0; return; }
            const totalBeats = 8 * count;
            baseBpm = (totalBeats / duration) * 60;
        }

        function setSpeed(speed) {
            speed = Math.round(speed * 100) / 100;
            speed = Math.max(0.5, Math.min(1.5, speed));
            currentSpeed = speed;
            if (player) player.setPlaybackRate(speed);
            updateSpeedSlider();
        }

        function updateSpeedSlider() {
            const pct = ((currentSpeed - 0.5) / (1.5 - 0.5)) * 100;
            const fill = document.getElementById('speedSliderFill');
            const thumb = document.getElementById('speedSliderThumb');
            if (fill) fill.style.width = pct + '%';
            if (thumb) thumb.style.left = pct + '%';

            // Update active tick highlights
            document.querySelectorAll('.speed-tick, .speed-label-top, .speed-label-bottom').forEach(el => {
                el.classList.remove('active-tick');
            });
            const speedStr = currentSpeed.toFixed(2);
            document.querySelectorAll('.speed-tick').forEach(el => {
                if (el.dataset.speed === speedStr) {
                    el.classList.add('active-tick');
                    const pctVal = el.style.left;
                    document.querySelectorAll(`.speed-label-top[data-speed="${speedStr}"], .speed-label-bottom[data-speed="${speedStr}"]`).forEach(l => l.classList.add('active-tick'));
                }
            });
        }

        function renderSpeedTicks() {
            const track = document.getElementById('speedSliderTrack');
            // Remove old ticks/labels
            track.querySelectorAll('.speed-tick, .speed-label-top, .speed-label-bottom').forEach(el => el.remove());

            calcBpm();

            // Build tick list: always include 0.5x, 1.0x, 1.5x
            // Then add ticks at BPM intervals of 20 within range
            const ticks = new Map(); // speed -> { bpm, speed }
            ticks.set('0.50', { speed: 0.5, label: '0.5x' });
            ticks.set('1.00', { speed: 1.0, label: '1x' });
            ticks.set('1.50', { speed: 1.5, label: '1.5x' });

            if (baseBpm > 0) {
                // Calculate BPM at boundaries
                const bpmAt05 = baseBpm * 0.5;
                const bpmAt15 = baseBpm * 1.5;
                // Add ticks every 20 BPM
                const startBpm = Math.ceil(bpmAt05 / 20) * 20;
                const endBpm = Math.floor(bpmAt15 / 20) * 20;
                for (let bpm = startBpm; bpm <= endBpm; bpm += 20) {
                    const spd = bpm / baseBpm;
                    if (spd >= 0.5 && spd <= 1.5) {
                        const key = spd.toFixed(2);
                        if (!ticks.has(key)) {
                            ticks.set(key, { speed: spd, label: spd.toFixed(2) + 'x' });
                        }
                    }
                }
            }

            // Render ticks
            ticks.forEach((info, key) => {
                const pct = ((info.speed - 0.5) / (1.5 - 0.5)) * 100;

                const tick = document.createElement('div');
                tick.className = 'speed-tick';
                tick.style.left = pct + '%';
                tick.dataset.speed = key;
                track.appendChild(tick);

                // Top label: BPM
                const topLbl = document.createElement('div');
                topLbl.className = 'speed-label-top';
                topLbl.style.left = pct + '%';
                topLbl.dataset.speed = key;
                if (baseBpm > 0) {
                    const bpmVal = baseBpm * info.speed;
                    topLbl.textContent = Math.round(bpmVal);
                }
                track.appendChild(topLbl);

                // Bottom label: speed ratio
                const botLbl = document.createElement('div');
                botLbl.className = 'speed-label-bottom';
                botLbl.style.left = pct + '%';
                botLbl.dataset.speed = key;
                botLbl.textContent = info.label;
                track.appendChild(botLbl);
            });

            updateSpeedSlider();
        }

        // Speed slider interaction
        (function() {
            const track = document.getElementById('speedSliderTrack');
            if (!track) return;
            function seekSpeed(e) {
                const rect = track.getBoundingClientRect();
                const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
                const speed = 0.5 + ratio * (1.5 - 0.5);
                // Snap to nearest tick
                const ticks = track.querySelectorAll('.speed-tick');
                let closest = speed, minDist = Infinity;
                ticks.forEach(t => {
                    const tSpd = parseFloat(t.dataset.speed);
                    const tPct = (tSpd - 0.5) / (1.5 - 0.5);
                    const dist = Math.abs(ratio - tPct);
                    if (dist < 0.03 && dist < minDist) { minDist = dist; closest = tSpd; }
                });
                setSpeed(closest);
            }
            let dragging = false;
            track.addEventListener('mousedown', (e) => { dragging = true; seekSpeed(e); e.preventDefault(); });
            document.addEventListener('mousemove', (e) => { if (dragging) seekSpeed(e); });
            document.addEventListener('mouseup', () => { dragging = false; });
            track.addEventListener('touchstart', (e) => { dragging = true; seekSpeed(e.touches[0]); e.preventDefault(); }, { passive: false });
            document.addEventListener('touchmove', (e) => { if (dragging) seekSpeed(e.touches[0]); }, { passive: false });
            document.addEventListener('touchend', () => { dragging = false; });
        })();
        renderSpeedTicks();

        // ==================== Update loop ====================
        function startUpdateLoop() {
            if (updateInterval) clearInterval(updateInterval);
            updateInterval = setInterval(() => {
                if (!player || !player.getCurrentTime) return;

                const current = player.getCurrentTime();
                const duration = player.getDuration();

                if (duration > 0) {
                    document.getElementById('progressBar').style.width = (current / duration * 100) + '%';
                }

                document.getElementById('currentTimeDisplay').textContent = formatTimeMMSS(current);

                if (beats.length > 0) {
                    updateSliderPositions(current);

                    let closestIndex = 0;
                    for (let i = beats.length - 1; i >= 0; i--) {
                        if (current >= beats[i].time - 0.05) {
                            closestIndex = i;
                            break;
                        }
                    }
                    if (closestIndex !== currentBeatIndex) {
                        currentBeatIndex = closestIndex;
                        highlightBeat(closestIndex);
                        checkMetronome();
                    }
                    updateBeatWatermark();
                }

                if (isLooping && current >= loopEndTime) {
                    player.seekTo(loopStartTime, true);
                }
            }, 50);
        }

        document.getElementById('progressBarContainer').addEventListener('click', function(e) {
            if (!player) return;
            const rect = this.getBoundingClientRect();
            const ratio = (e.clientX - rect.left) / rect.width;
            const duration = player.getDuration();
            if (duration > 0) {
                player.seekTo(ratio * duration, true);
            }
        });

        // ==================== Beta: Mirror ====================
        let isMirrored = false;
        function toggleMirror() {
            isMirrored = !isMirrored;
            document.querySelector('.video-wrapper').classList.toggle('mirrored', isMirrored);
            document.getElementById('mirrorBtn').textContent = `鏡像: ${isMirrored ? 'ON' : 'OFF'}`;
            document.getElementById('mirrorBtn').classList.toggle('btn-active', isMirrored);
        }

        // ==================== Beta: Metronome ====================
        let isMetronomeOn = false;
        let audioCtx = null;
        let lastMetronomeBeat = -1;

        function toggleMetronome() {
            isMetronomeOn = !isMetronomeOn;
            document.getElementById('metronomeBtn').textContent = `🥁 節拍器: ${isMetronomeOn ? 'ON' : 'OFF'}`;
            document.getElementById('metronomeBtn').classList.toggle('btn-active', isMetronomeOn);
            if (isMetronomeOn && !audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            lastMetronomeBeat = -1;
        }

        function playClick(isDownbeat) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = isDownbeat ? 1000 : 700;
            gain.gain.value = isDownbeat ? 0.3 : 0.15;
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.08);
        }

        function checkMetronome() {
            if (!isMetronomeOn || beats.length === 0) return;
            if (currentBeatIndex !== lastMetronomeBeat && currentBeatIndex >= 0) {
                lastMetronomeBeat = currentBeatIndex;
                const isDownbeat = beats[currentBeatIndex].beatNumber === 1;
                playClick(isDownbeat);
            }
        }

        // ==================== Beta: Fullscreen ====================
        let isFullscreen = false;
        let fullscreenContainer = null;

        function toggleFullscreen() {
            if (isFullscreen) {
                exitFullscreen();
            } else {
                enterFullscreen();
            }
        }

        function enterFullscreen() {
            isFullscreen = true;
            const videoSection = document.querySelector('[data-section="video"]');

            fullscreenContainer = document.createElement('div');
            fullscreenContainer.className = 'fullscreen-mode';
            fullscreenContainer.id = 'fullscreenContainer';

            // Move video into fullscreen container (watermark travels with it)
            const wrapper = videoSection.querySelector('.video-wrapper');
            fullscreenContainer.appendChild(wrapper);

            // Bottom controls overlay
            const overlay = document.createElement('div');
            overlay.className = 'fullscreen-overlay';
            overlay.innerHTML = `
                <button class="btn btn-primary" onclick="togglePlay()" id="fsPlayBtn">▶ 播放</button>
                <button class="btn btn-secondary" onclick="toggleMirror()">鏡像</button>
                <button class="btn btn-secondary" onclick="toggleMetronome()">節拍器</button>
                <button class="btn btn-secondary" onclick="toggleFullscreen()">✕ 離開</button>
            `;
            fullscreenContainer.appendChild(overlay);

            document.body.appendChild(fullscreenContainer);
            document.body.style.overflow = 'hidden';
        }

        function exitFullscreen() {
            isFullscreen = false;
            const videoSection = document.querySelector('[data-section="video"]');
            const wrapper = fullscreenContainer.querySelector('.video-wrapper');
            videoSection.appendChild(wrapper);
            fullscreenContainer.remove();
            fullscreenContainer = null;
            document.body.style.overflow = '';
        }

        let isWatermarkOn = false;
        let beatOffset = 0;

        function toggleWatermark() {
            isWatermarkOn = !isWatermarkOn;
            document.getElementById('beatWatermark').style.display = isWatermarkOn ? '' : 'none';
            document.getElementById('watermarkBtn').textContent = `數拍: ${isWatermarkOn ? 'ON' : 'OFF'}`;
            document.getElementById('watermarkBtn').classList.toggle('btn-active', isWatermarkOn);
        }

        function adjustBeatOffset(delta) {
            beatOffset = Math.round((beatOffset + delta) * 100) / 100;
            document.getElementById('beatOffsetInput').value = beatOffset.toFixed(2);
        }

        function setBeatOffsetFromInput() {
            const val = parseFloat(document.getElementById('beatOffsetInput').value);
            if (!isNaN(val)) beatOffset = Math.round(val * 100) / 100;
            document.getElementById('beatOffsetInput').value = beatOffset.toFixed(2);
        }

        function updateBeatWatermark() {
            if (!isWatermarkOn || beats.length === 0) return;
            const numEl = document.getElementById('wmBeatNum');
            const subEl = document.getElementById('wmBeatSub');
            if (!numEl) return;

            // Find beat index at offset-adjusted time
            const current = player ? player.getCurrentTime() + beatOffset : 0;
            let idx = -1;
            for (let i = beats.length - 1; i >= 0; i--) {
                if (current >= beats[i].time) { idx = i; break; }
            }
            if (idx < 0) {
                numEl.textContent = '-';
                subEl.textContent = '';
                return;
            }
            const beat = beats[idx];
            numEl.textContent = beat.beatNumber;
            subEl.textContent = `第 ${beat.groupIndex + 1} 個八拍`;
        }

        // ==================== Beta: Beat Preview (multi-player) ====================
        function openBeatPreview() {
            if (beats.length === 0) {
                alert('請先設定開始/結束秒數與八拍組數');
                return;
            }

            const groupIdx = currentBeatIndex >= 0 ? beats[currentBeatIndex].groupIndex : 0;
            const groupBeats = beats.filter(b => b.groupIndex === groupIdx);

            if (videoMode === 'local') {
                openLocalBeatPreview(groupIdx, groupBeats);
            } else {
                const videoId = extractVideoId(document.getElementById('videoUrl').value);
                if (!videoId) { alert('無效的影片網址'); return; }
                const params = new URLSearchParams();
                params.set('preview', '1');
                params.set('vid', videoId);
                params.set('g', groupIdx);
                params.set('beats', groupBeats.map(b => b.beatNumber + ':' + b.time.toFixed(2)).join(','));
                window.open(window.location.pathname + '?' + params.toString(), '_blank');
            }
        }

        // Local video: capture frames with canvas
        function openLocalBeatPreview(groupIdx, groupBeats) {
            const video = document.getElementById('localPlayer');
            const captures = [];
            let idx = 0;

            function captureNext() {
                if (idx >= groupBeats.length) {
                    showLocalPreview(groupIdx, captures);
                    return;
                }
                video.currentTime = groupBeats[idx].time;
                video.addEventListener('seeked', function onSeeked() {
                    video.removeEventListener('seeked', onSeeked);
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    captures.push({ num: groupBeats[idx].beatNumber, dataUrl: canvas.toDataURL('image/jpeg', 0.85) });
                    idx++;
                    captureNext();
                });
            }

            captureNext();
        }

        function showLocalPreview(groupIdx, captures) {
            const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
            <title>八拍預覽</title>
            <style>*{margin:0;padding:0;box-sizing:border-box;}body{background:#1a1a2e;}
            .scroll-wrap{width:100%;height:100vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
            .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;width:100%;min-height:100vh;}
            .grid img{width:100%;height:100%;object-fit:cover;}
            .dl-btn{position:fixed;bottom:16px;right:16px;z-index:100;background:#e94560;color:#fff;border:none;padding:10px 18px;border-radius:8px;font-size:0.9rem;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.5);}
            .dl-btn:active{background:#c73e54;}
            @media(max-width:700px){.grid{grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(4,auto);min-height:auto;padding-bottom:60px;}}</style></head>
            <body>
            <div class="scroll-wrap"><div class="grid">${captures.map(c => `<img src="${c.dataUrl}">`).join('')}</div></div>
            <button class="dl-btn" onclick="downloadPreview()">⬇ 下載照片</button>
            <script>
            function downloadPreview(){
                var canvas=document.createElement('canvas');
                var imgs=document.querySelectorAll('.grid img');
                var first=imgs[0];
                var cols=window.innerWidth<=700?2:4;
                var rows=Math.ceil(imgs.length/cols);
                var w=first.naturalWidth,h=first.naturalHeight;
                canvas.width=w*cols;canvas.height=h*rows;
                var ctx=canvas.getContext('2d');
                ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,canvas.width,canvas.height);
                imgs.forEach(function(img,i){
                    var c=i%cols,r=Math.floor(i/cols);
                    ctx.drawImage(img,c*w,r*h,w,h);
                });
                var a=document.createElement('a');
                a.download='beat-preview.jpg';
                a.href=canvas.toDataURL('image/jpeg',0.9);
                a.click();
            }
            <\/script></body></html>`;
            const blob = new Blob([html], { type: 'text/html' });
            window.open(URL.createObjectURL(blob), '_blank');
        }

        // ==================== Beta: Share Link ====================
        function shareLink() {
            const params = new URLSearchParams();
            params.set('v', document.getElementById('videoUrl').value);
            params.set('s', document.getElementById('startTime').value);
            params.set('e', document.getElementById('endTime').value);
            params.set('c', document.getElementById('beatCount').value);
            params.set('sp', currentSpeed);
            const url = window.location.origin + window.location.pathname + '?' + params.toString();

            if (navigator.clipboard) {
                navigator.clipboard.writeText(url).then(() => {
                    const btn = event.target;
                    const orig = btn.textContent;
                    btn.textContent = '✅ 已複製!';
                    setTimeout(() => btn.textContent = orig, 1500);
                });
            } else {
                prompt('複製此連結分享給舞伴：', url);
            }
        }

        function loadFromUrlParams() {
            const params = new URLSearchParams(window.location.search);
            if (!params.has('v')) return false;

            const v = params.get('v');
            const s = params.get('s');
            const e = params.get('e');
            const c = params.get('c');
            const sp = params.get('sp');

            if (v) document.getElementById('videoUrl').value = v;
            if (s) { document.getElementById('startTime').value = s; document.getElementById('loopStartTime').value = s; loopStartTime = parseFloat(s); }
            if (e) { document.getElementById('endTime').value = e; document.getElementById('loopEndTime').value = e; loopEndTime = parseFloat(e); }
            if (c) document.getElementById('beatCount').value = c;
            if (sp) currentSpeed = parseFloat(sp);
            updateBeatRangeDisplay();
            updateLoopRangeDisplay();
            return true;
        }

        // Load URL params on page init
        loadFromUrlParams();

        // ==================== Keyboard shortcuts ====================
        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;

            switch (e.key) {
                case 'Escape':
                    if (isFullscreen) exitFullscreen();
                    break;
                case ' ':
                    e.preventDefault();
                    togglePlay();
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    jumpBeats(e.shiftKey ? -8 : -1);
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    jumpBeats(e.shiftKey ? 8 : 1);
                    break;
                case 'l':
                case 'L':
                    toggleLoop();
                    break;
                case 'r':
                case 'R':
                    jumpToStart();
                    break;
                case 'm':
                case 'M':
                    toggleMirror();
                    break;
                case '-':
                case '_':
                    setSpeed(Math.max(0.5, currentSpeed - 0.05));
                    break;
                case '=':
                case '+':
                    setSpeed(Math.min(1.5, currentSpeed + 0.05));
                    break;
            }
        });

        } // end if not preview mode
    </script>
</body>
</html>
