<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>舞蹈練習播放器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            font-size: 1.6rem;
            margin-bottom: 20px;
            color: #e94560;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        /* Draggable sections */
        .draggable-section {
            margin-bottom: 20px;
            transition: transform 0.15s, opacity 0.15s;
        }

        .draggable-section.dragging {
            opacity: 0.5;
            transform: scale(0.98);
        }

        .draggable-section.drag-over {
            border-top: 3px solid #e94560;
        }

        .drag-handle {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: grab;
            user-select: none;
        }

        .drag-handle:active {
            cursor: grabbing;
        }

        .drag-icon {
            font-size: 0.9rem;
            color: #555;
            letter-spacing: 2px;
        }

        .video-wrapper.mirrored iframe {
            transform: scaleX(-1);
        }

        /* Fullscreen mode */
        .fullscreen-mode {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 10000;
            display: flex;
            flex-direction: column;
        }

        .fullscreen-mode .video-wrapper {
            flex: 1;
            padding-bottom: 0;
            border-radius: 0;
        }

        .fullscreen-mode .video-wrapper iframe {
            width: 100%;
            height: 100%;
        }

        .fullscreen-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.85));
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            z-index: 10001;
        }

        .fullscreen-overlay .btn {
            font-size: 0.85rem;
            padding: 6px 14px;
        }

        .fullscreen-beat-display {
            position: absolute;
            top: 15px;
            right: 20px;
            z-index: 10001;
            text-align: right;
        }

        .fullscreen-beat-big {
            font-size: 4rem;
            font-weight: bold;
            color: #e94560;
            line-height: 1;
            text-shadow: 0 0 20px rgba(233,69,96,0.5);
        }

        .fullscreen-beat-sub {
            font-size: 1rem;
            color: #aaa;
        }

        /* Video Section */
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Panels */
        .panel {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
        }

        .panel h2 {
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: #e94560;
        }

        .settings-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .field label {
            font-size: 0.85rem;
            color: #aaa;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .field input, .field select {
            background: #0f3460;
            border: 1px solid #333;
            color: #eee;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 1rem;
            width: 120px;
        }

        .field input:focus, .field select:focus {
            outline: none;
            border-color: #e94560;
        }

        /* Info tooltip */
        .info-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #0f3460;
            color: #888;
            font-size: 0.65rem;
            cursor: help;
            position: relative;
            flex-shrink: 0;
        }

        .info-icon .tooltip {
            display: none;
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%);
            background: #0a1628;
            border: 1px solid #333;
            color: #ccc;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            white-space: nowrap;
            z-index: 100;
            line-height: 1.5;
            font-weight: normal;
        }

        .info-icon .tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 6px solid transparent;
            border-top-color: #333;
        }

        .info-icon:hover .tooltip {
            display: block;
        }

        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-primary {
            background: #e94560;
            color: #fff;
        }

        .btn-primary:hover {
            background: #c73e54;
        }

        .btn-secondary {
            background: #0f3460;
            color: #eee;
            border: 1px solid #444;
        }

        .btn-secondary:hover {
            background: #1a4a8a;
        }

        .btn-active {
            background: #e94560 !important;
            border-color: #e94560 !important;
        }

        /* URL input */
        .url-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .url-row input {
            flex: 1;
            width: auto;
        }

        /* Beat Timeline Slider */
        .beat-slider-group {
            margin-bottom: 18px;
        }

        .beat-slider-header {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
            margin-bottom: 8px;
        }

        .beat-slider-header:hover .beat-slider-label {
            color: #bbb;
        }

        .beat-slider-toggle {
            font-size: 0.75rem;
            color: #888;
            transition: transform 0.2s;
        }

        .beat-slider-toggle.collapsed {
            transform: rotate(-90deg);
        }

        .beat-slider-label {
            font-size: 0.8rem;
            color: #888;
            transition: color 0.15s;
        }

        .beat-slider-body.collapsed {
            display: none;
        }

        .beat-slider-track {
            position: relative;
            width: 100%;
            height: 14px;
            background: #0f3460;
            border-radius: 6px;
            cursor: pointer;
            user-select: none;
        }

        .beat-slider-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: linear-gradient(90deg, #e94560, #c73e54);
            border-radius: 6px 0 0 6px;
            pointer-events: none;
        }

        .beat-slider-thumb {
            position: absolute;
            top: -3px;
            width: 4px;
            height: 20px;
            background: #fff;
            border-radius: 2px;
            pointer-events: none;
            transform: translateX(-2px);
            box-shadow: 0 0 6px rgba(233,69,96,0.6);
        }

        .beat-tick {
            position: absolute;
            top: 0;
            width: 1px;
            height: 100%;
            background: rgba(255,255,255,0.15);
            pointer-events: none;
        }

        .beat-tick.first-of-group {
            background: rgba(255,255,255,0.35);
            width: 2px;
        }

        .beat-tick-label {
            position: absolute;
            top: 100%;
            transform: translateX(-50%);
            font-size: 0.65rem;
            color: #666;
            margin-top: 3px;
            pointer-events: none;
        }

        .beat-tick-label.active {
            color: #e94560;
            font-weight: bold;
        }

        /* Controls */
        .controls-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .controls-row .btn {
            font-size: 1.1rem;
            padding: 10px 18px;
        }

        .speed-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .speed-control label {
            font-size: 0.9rem;
            color: #aaa;
        }

        .speed-buttons {
            display: flex;
            gap: 6px;
        }

        .speed-btn {
            padding: 6px 12px;
            border: 1px solid #444;
            border-radius: 6px;
            background: #0f3460;
            color: #ccc;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.15s;
        }

        .speed-btn:hover {
            border-color: #e94560;
        }

        .speed-btn.active {
            background: #e94560;
            border-color: #e94560;
            color: #fff;
        }

        .loop-status {
            text-align: center;
            font-size: 0.9rem;
            color: #aaa;
        }

        .loop-status span {
            color: #e94560;
            font-weight: bold;
        }

        /* Progress bar */
        .progress-bar-container {
            width: 100%;
            height: 8px;
            background: #0f3460;
            border-radius: 4px;
            margin-bottom: 10px;
            cursor: pointer;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: #e94560;
            border-radius: 4px;
            width: 0%;
            transition: width 0.1s linear;
        }

        .current-time {
            text-align: center;
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 15px;
        }

        /* Keyboard hints */
        .keyboard-hints {
            background: #16213e;
            border-radius: 12px;
            padding: 15px 20px;
            font-size: 0.8rem;
            color: #666;
        }

        .keyboard-hints h3 {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 8px;
        }

        .keyboard-hints kbd {
            background: #0f3460;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
            color: #aaa;
        }

        .hint-row {
            margin-bottom: 4px;
        }

        /* Responsive - mobile */
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }

            h1 {
                font-size: 1.3rem;
                margin-bottom: 12px;
            }

            .panel {
                padding: 14px;
            }

            .panel h2 {
                font-size: 0.95rem;
                margin-bottom: 10px;
            }

            .settings-row {
                flex-direction: column;
                gap: 10px;
            }

            .field input {
                width: 100%;
            }

            .btn {
                padding: 6px 14px;
                font-size: 0.85rem;
            }

            .controls-row .btn {
                font-size: 0.95rem;
                padding: 8px 14px;
            }

            .speed-buttons {
                flex-wrap: wrap;
            }

            .speed-btn {
                padding: 5px 10px;
                font-size: 0.8rem;
            }

            .url-row {
                flex-direction: column;
            }

            .url-row input {
                width: 100%;
            }

            .info-icon .tooltip {
                white-space: normal;
                width: 200px;
            }

            .draggable-section {
                margin-bottom: 12px;
            }

            .keyboard-hints {
                padding: 10px 14px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🩰 舞蹈練習播放器</h1>

        <!-- Video -->
        <div class="draggable-section" data-section="video">
            <div class="video-wrapper">
                <div id="player"></div>
            </div>
        </div>

        <!-- Beat Timeline -->
        <div class="draggable-section" data-section="beats" id="beatTimeline" style="display:none;">
            <div class="panel">
                <h2><span class="drag-handle"><span class="drag-icon">⠿</span> 🎵 拍子時間軸</span></h2>
                <div id="beatsContainer"></div>
            </div>
        </div>

        <!-- Controls -->
        <div class="draggable-section" data-section="controls">
            <div class="panel">
                <h2><span class="drag-handle"><span class="drag-icon">⠿</span> 🎛️ 播放控制</span></h2>
                <div class="progress-bar-container" id="progressBarContainer">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="current-time" id="currentTimeDisplay">0:00.0</div>

                <div class="controls-row">
                    <button class="btn btn-primary" onclick="togglePlay()" id="playBtn">▶ 播放</button>
                    <button class="btn btn-secondary" id="loopBtn" onclick="toggleLoop()">循環: OFF</button>
                    <button class="btn btn-secondary" onclick="toggleFullscreen()">📺 全螢幕</button>
                </div>

                <div class="speed-control">
                    <label>速度：</label>
                    <div class="speed-buttons">
                        <button class="speed-btn" onclick="setSpeed(0.25)">0.25x</button>
                        <button class="speed-btn" onclick="setSpeed(0.5)">0.5x</button>
                        <button class="speed-btn" onclick="setSpeed(0.75)">0.75x</button>
                        <button class="speed-btn active" onclick="setSpeed(1)">1x</button>
                        <button class="speed-btn" onclick="setSpeed(1.25)">1.25x</button>
                        <button class="speed-btn" onclick="setSpeed(1.5)">1.5x</button>
                    </div>
                </div>

                <div class="loop-status" id="loopStatus"></div>
            </div>
        </div>

        <!-- Settings -->
        <div class="draggable-section" data-section="settings">
            <div class="panel">
                <h2><span class="drag-handle"><span class="drag-icon">⠿</span> ⚙️ 設定</span></h2>
                <div class="url-row">
                    <input type="text" id="videoUrl" placeholder="YouTube 影片網址" value="https://www.youtube.com/watch?v=GvHOEJPabuk">
                    <button class="btn btn-primary" onclick="loadVideo()">載入影片</button>
                </div>
                <div class="settings-row">
                    <div class="field">
                        <label>
                            開始秒數
                            <span class="info-icon">?
                                <span class="tooltip">按在第 1 個八拍的第 1 拍的瞬間</span>
                            </span>
                        </label>
                        <input type="number" id="startTime" value="4.6" step="0.1" min="0">
                    </div>
                    <div class="field">
                        <label>
                            結束秒數
                            <span class="info-icon">?
                                <span class="tooltip">按在最後一個八拍結束後，<br>假想的「下一拍」的瞬間<br>（例如 3 組八拍，按在第 4 組的第 1 拍位置）</span>
                            </span>
                        </label>
                        <input type="number" id="endTime" value="16.0" step="0.1" min="0">
                    </div>
                    <div class="field">
                        <label>數量</label>
                        <input type="number" id="beatCount" value="3" step="1" min="1">
                    </div>
                    <div class="field">
                        <label>拍數單位</label>
                        <select id="beatUnit">
                            <option value="8">八拍 (組)</option>
                            <option value="1">拍 (單拍)</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" onclick="generateBeats()">產生拍子</button>
                    <button class="btn btn-secondary" onclick="getCurrentTime()">取得目前秒數</button>
                </div>
            </div>
        </div>

        <!-- Config Export/Import -->
        <div class="draggable-section" data-section="config">
            <div class="panel">
                <h2><span class="drag-handle"><span class="drag-icon">⠿</span> 💾 匯出 / 匯入設定</span></h2>
                <p style="font-size:0.8rem; color:#888; margin-bottom:10px;">複製下方文字保存，下次貼回即可還原設定</p>
                <div style="display:flex; gap:10px;">
                    <textarea id="configText" rows="4" style="flex:1; background:#0f3460; border:1px solid #333; color:#eee; padding:10px; border-radius:8px; font-size:0.85rem; font-family:monospace; resize:vertical;" placeholder="點擊「匯出」產生設定字串，或貼上之前的設定後按「匯入」"></textarea>
                    <div style="display:flex; flex-direction:column; gap:8px;">
                        <button class="btn btn-primary" onclick="exportConfig()">匯出</button>
                        <button class="btn btn-secondary" onclick="importConfig()">匯入</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Beta Features -->
        <div class="panel" style="margin-bottom:20px; border: 1px solid #e9456044;">
            <h2 style="display:flex; align-items:center; gap:8px;">
                🧪 Beta 功能
                <span style="font-size:0.65rem; background:#e94560; color:#fff; padding:2px 8px; border-radius:4px;">BETA</span>
            </h2>
            <div class="controls-row" style="justify-content:flex-start; margin-bottom:0;">
                <button class="btn btn-secondary" id="mirrorBtn" onclick="toggleMirror()">🪞 鏡像: OFF</button>
                <button class="btn btn-secondary" id="metronomeBtn" onclick="toggleMetronome()">🥁 節拍器: OFF</button>
                <button class="btn btn-secondary" onclick="shareLink()">🔗 分享連結</button>
                <button class="btn btn-secondary" onclick="openBeatPreview()">📸 八拍預覽</button>
            </div>
        </div>

        <!-- Keyboard Hints -->
        <div class="keyboard-hints">
            <h3>⌨️ 鍵盤快捷鍵</h3>
            <div class="hint-row"><kbd>Space</kbd> 播放/暫停</div>
            <div class="hint-row"><kbd>←</kbd> / <kbd>→</kbd> 上/下一拍</div>
            <div class="hint-row"><kbd>Shift+←</kbd> / <kbd>Shift+→</kbd> 上/下一個八拍</div>
            <div class="hint-row"><kbd>L</kbd> 開關循環播放</div>
            <div class="hint-row"><kbd>R</kbd> 回到開始</div>
            <div class="hint-row"><kbd>M</kbd> 鏡像翻轉</div>
            <div class="hint-row"><kbd>-</kbd> / <kbd>+</kbd> 減速/加速</div>
        </div>

        <footer style="text-align:center; padding:20px 0 10px; font-size:0.75rem; color:#555;">
            v0.9 — Kai, built with Claude Code
        </footer>
    </div>

    <script>
        // State
        let player = null;
        let beats = [];
        let currentBeatIndex = -1;
        let isLooping = false;
        let currentSpeed = 1;
        let startTime = 4.6;
        let endTime = 16.0;
        let updateInterval = null;

        // ==================== Drag & Drop for sections (desktop + touch) ====================
        (function initDragDrop() {
            const container = document.querySelector('.container');
            let draggedEl = null;

            // --- Desktop: HTML5 drag, only from handle ---
            container.addEventListener('mousedown', function(e) {
                const icon = e.target.closest('.drag-icon');
                if (!icon) return;
                const section = icon.closest('.draggable-section');
                if (section) section.setAttribute('draggable', 'true');
            });

            document.addEventListener('mouseup', function() {
                document.querySelectorAll('.draggable-section[draggable="true"]').forEach(el => {
                    el.setAttribute('draggable', 'false');
                });
            });

            container.addEventListener('dragstart', function(e) {
                const section = e.target.closest('.draggable-section');
                if (!section) return;
                draggedEl = section;
                section.classList.add('dragging');
                e.dataTransfer.effectAllowed = 'move';
            });

            container.addEventListener('dragend', function(e) {
                const section = e.target.closest('.draggable-section');
                if (section) {
                    section.classList.remove('dragging');
                    section.setAttribute('draggable', 'false');
                }
                document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
                draggedEl = null;
            });

            container.addEventListener('dragover', function(e) {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                const section = e.target.closest('.draggable-section');
                if (!section || section === draggedEl) return;
                document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
                section.classList.add('drag-over');
            });

            container.addEventListener('dragleave', function(e) {
                const section = e.target.closest('.draggable-section');
                if (section) section.classList.remove('drag-over');
            });

            container.addEventListener('drop', function(e) {
                e.preventDefault();
                const target = e.target.closest('.draggable-section');
                if (!target || !draggedEl || target === draggedEl) return;
                target.classList.remove('drag-over');

                const sections = [...container.querySelectorAll('.draggable-section')];
                const dragIdx = sections.indexOf(draggedEl);
                const dropIdx = sections.indexOf(target);

                if (dragIdx < dropIdx) {
                    target.after(draggedEl);
                } else {
                    target.before(draggedEl);
                }
            });

            // --- Touch: for iPhone/mobile ---
            let touchDragEl = null;
            let touchClone = null;
            let touchStartY = 0;

            container.addEventListener('touchstart', function(e) {
                const icon = e.target.closest('.drag-icon');
                if (!icon) return;
                const section = icon.closest('.draggable-section');
                if (!section) return;

                touchDragEl = section;
                touchStartY = e.touches[0].clientY;

                // Create a visual clone
                touchClone = section.cloneNode(true);
                touchClone.style.position = 'fixed';
                touchClone.style.width = section.offsetWidth + 'px';
                touchClone.style.opacity = '0.7';
                touchClone.style.pointerEvents = 'none';
                touchClone.style.zIndex = '9999';
                touchClone.style.left = section.getBoundingClientRect().left + 'px';
                touchClone.style.top = section.getBoundingClientRect().top + 'px';
                document.body.appendChild(touchClone);

                section.classList.add('dragging');
                e.preventDefault();
            }, { passive: false });

            document.addEventListener('touchmove', function(e) {
                if (!touchDragEl || !touchClone) return;
                const touch = e.touches[0];
                const deltaY = touch.clientY - touchStartY;
                const origTop = touchDragEl.getBoundingClientRect().top;
                touchClone.style.top = (origTop + deltaY) + 'px';

                // Find drop target
                document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
                const elemBelow = document.elementFromPoint(touch.clientX, touch.clientY);
                if (elemBelow) {
                    const target = elemBelow.closest('.draggable-section');
                    if (target && target !== touchDragEl) {
                        target.classList.add('drag-over');
                    }
                }
                e.preventDefault();
            }, { passive: false });

            document.addEventListener('touchend', function(e) {
                if (!touchDragEl) return;

                // Find final drop target
                const overEl = document.querySelector('.draggable-section.drag-over');
                if (overEl && overEl !== touchDragEl) {
                    const sections = [...container.querySelectorAll('.draggable-section')];
                    const dragIdx = sections.indexOf(touchDragEl);
                    const dropIdx = sections.indexOf(overEl);
                    if (dragIdx < dropIdx) {
                        overEl.after(touchDragEl);
                    } else {
                        overEl.before(touchDragEl);
                    }
                }

                touchDragEl.classList.remove('dragging');
                document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
                if (touchClone) {
                    touchClone.remove();
                    touchClone = null;
                }
                touchDragEl = null;
            });
        })();

        // ==================== YouTube Player ====================
        function extractVideoId(url) {
            const patterns = [
                /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\s?#]+)/,
                /^([a-zA-Z0-9_-]{11})$/
            ];
            for (const pattern of patterns) {
                const match = url.match(pattern);
                if (match) return match[1];
            }
            return null;
        }

        const tag = document.createElement('script');
        tag.src = 'https://www.youtube.com/iframe_api';
        document.head.appendChild(tag);

        function onYouTubeIframeAPIReady() {
            const videoId = extractVideoId(document.getElementById('videoUrl').value);
            player = new YT.Player('player', {
                videoId: videoId || 'GvHOEJPabuk',
                playerVars: {
                    autoplay: 0,
                    controls: 1,
                    rel: 0,
                    modestbranding: 1
                },
                events: {
                    onReady: onPlayerReady,
                    onStateChange: onPlayerStateChange
                }
            });
        }

        function onPlayerReady() {
            startUpdateLoop();
            if (currentSpeed !== 1) setSpeed(currentSpeed);
            generateBeats();
        }

        function onPlayerStateChange(event) {
            const playBtn = document.getElementById('playBtn');
            if (event.data === YT.PlayerState.PLAYING) {
                playBtn.textContent = '⏸ 暫停';
            } else {
                playBtn.textContent = '▶ 播放';
            }
        }

        function loadVideo() {
            const url = document.getElementById('videoUrl').value;
            const videoId = extractVideoId(url);
            if (!videoId) {
                alert('請輸入有效的 YouTube 網址');
                return;
            }
            if (player && player.loadVideoById) {
                player.loadVideoById(videoId);
            }

        // ==================== Time helpers ====================
        function getCurrentTime() {
            if (!player || !player.getCurrentTime) return;
            const time = player.getCurrentTime().toFixed(1);
            const startInput = document.getElementById('startTime');
            const endInput = document.getElementById('endTime');
            if (parseFloat(startInput.value) === 0 && parseFloat(endInput.value) === 16) {
                startInput.value = time;
            } else {
                endInput.value = time;
            }
        }

        // ==================== Beat generation ====================
        function generateBeats() {
            startTime = parseFloat(document.getElementById('startTime').value);
            endTime = parseFloat(document.getElementById('endTime').value);
            const unit = parseInt(document.getElementById('beatUnit').value);
            const count = parseInt(document.getElementById('beatCount').value);
            const totalBeats = unit * count;
            const duration = endTime - startTime;
            const beatInterval = duration / totalBeats;

            beats = [];
            for (let i = 0; i < totalBeats; i++) {
                beats.push({
                    index: i,
                    time: startTime + i * beatInterval,
                    beatNumber: (i % 8) + 1,
                    groupIndex: Math.floor(i / 8)
                });
            }

            renderBeats();
            document.getElementById('beatTimeline').style.display = 'block';
            buildSliderGroups();
        }

        function renderBeats() {
            const container = document.getElementById('beatsContainer');
            container.innerHTML = '';

            const groups = {};
            beats.forEach(beat => {
                if (!groups[beat.groupIndex]) groups[beat.groupIndex] = [];
                groups[beat.groupIndex].push(beat);
            });

            const beatInterval = beats.length > 1 ? beats[1].time - beats[0].time : 0;

            Object.keys(groups).forEach(groupIdx => {
                const group = groups[groupIdx];
                const groupStart = group[0].time;
                const groupEnd = group[group.length - 1].time + beatInterval;
                const groupDuration = groupEnd - groupStart;

                const groupDiv = document.createElement('div');
                groupDiv.className = 'beat-slider-group';

                // Header
                const header = document.createElement('div');
                header.className = 'beat-slider-header';

                const toggle = document.createElement('span');
                toggle.className = 'beat-slider-toggle';
                toggle.textContent = '▼';

                const label = document.createElement('span');
                label.className = 'beat-slider-label';
                label.textContent = `第 ${parseInt(groupIdx) + 1} 個八拍 (${groupStart.toFixed(1)}s ~ ${groupEnd.toFixed(1)}s)`;

                header.appendChild(toggle);
                header.appendChild(label);
                groupDiv.appendChild(header);

                // Slider body (collapsible)
                const body = document.createElement('div');
                body.className = 'beat-slider-body';

                header.addEventListener('click', () => {
                    body.classList.toggle('collapsed');
                    toggle.classList.toggle('collapsed');
                });

                // Track
                const track = document.createElement('div');
                track.className = 'beat-slider-track';
                track.dataset.groupIdx = groupIdx;

                const fill = document.createElement('div');
                fill.className = 'beat-slider-fill';
                fill.id = `slider-fill-${groupIdx}`;
                track.appendChild(fill);

                // Tick marks for each beat
                group.forEach(beat => {
                    const pct = ((beat.time - groupStart) / groupDuration) * 100;

                    const tick = document.createElement('div');
                    tick.className = 'beat-tick' + (beat.beatNumber === 1 ? ' first-of-group' : '');
                    tick.style.left = pct + '%';
                    track.appendChild(tick);

                    const tickLabel = document.createElement('div');
                    tickLabel.className = 'beat-tick-label';
                    tickLabel.id = `tick-label-${beat.index}`;
                    tickLabel.textContent = beat.beatNumber;
                    tickLabel.style.left = pct + '%';
                    track.appendChild(tickLabel);
                });

                // Thumb
                const thumb = document.createElement('div');
                thumb.className = 'beat-slider-thumb';
                thumb.id = `slider-thumb-${groupIdx}`;
                track.appendChild(thumb);

                // Click/drag on track to seek
                function seekFromEvent(e) {
                    const rect = track.getBoundingClientRect();
                    const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
                    const time = groupStart + ratio * groupDuration;
                    if (player) player.seekTo(time, true);
                }

                let isDraggingSlider = false;
                track.addEventListener('mousedown', (e) => {
                    isDraggingSlider = true;
                    seekFromEvent(e);
                    e.preventDefault();
                });
                document.addEventListener('mousemove', (e) => {
                    if (isDraggingSlider) seekFromEvent(e);
                });
                document.addEventListener('mouseup', () => {
                    isDraggingSlider = false;
                });

                // Touch support
                track.addEventListener('touchstart', (e) => {
                    isDraggingSlider = true;
                    seekFromEvent(e.touches[0]);
                    e.preventDefault();
                });
                document.addEventListener('touchmove', (e) => {
                    if (isDraggingSlider) seekFromEvent(e.touches[0]);
                });
                document.addEventListener('touchend', () => {
                    isDraggingSlider = false;
                });

                body.appendChild(track);
                groupDiv.appendChild(body);
                container.appendChild(groupDiv);
            });
        }

        // ==================== Navigation ====================
        function jumpToBeat(index) {
            if (index < 0 || index >= beats.length || !player) return;
            currentBeatIndex = index;
            player.seekTo(beats[index].time, true);
            highlightBeat(index);
        }

        function jumpBeats(n) {
            if (beats.length === 0) {
                if (!player) return;
                const current = player.getCurrentTime();
                player.seekTo(Math.max(0, current + n * 0.5), true);
                return;
            }
            const newIndex = Math.max(0, Math.min(beats.length - 1, currentBeatIndex + n));
            jumpToBeat(newIndex);
        }

        function highlightBeat(index) {
            document.querySelectorAll('.beat-tick-label').forEach(el => el.classList.remove('active'));
            const tickLabel = document.getElementById(`tick-label-${index}`);
            if (tickLabel) tickLabel.classList.add('active');
        }

        // Cached group info for slider updates (rebuilt on generateBeats)
        let sliderGroups = [];

        function buildSliderGroups() {
            sliderGroups = [];
            if (beats.length === 0) return;
            const beatInterval = beats.length > 1 ? beats[1].time - beats[0].time : 0;
            const groups = {};
            beats.forEach(b => {
                if (!groups[b.groupIndex]) groups[b.groupIndex] = [];
                groups[b.groupIndex].push(b);
            });
            Object.keys(groups).forEach(gIdx => {
                const group = groups[gIdx];
                const gStart = group[0].time;
                const gEnd = group[group.length - 1].time + beatInterval;
                sliderGroups.push({
                    idx: parseInt(gIdx),
                    start: gStart,
                    end: gEnd,
                    duration: gEnd - gStart,
                    fill: document.getElementById(`slider-fill-${gIdx}`),
                    thumb: document.getElementById(`slider-thumb-${gIdx}`)
                });
            });
        }

        function updateSliderPositions(currentTime) {
            for (const g of sliderGroups) {
                if (currentTime >= g.start && currentTime < g.end) {
                    const pct = ((currentTime - g.start) / g.duration) * 100;
                    if (g.fill) g.fill.style.width = pct + '%';
                    if (g.thumb) { g.thumb.style.left = pct + '%'; g.thumb.style.display = 'block'; }
                } else if (currentTime >= g.end) {
                    if (g.fill) g.fill.style.width = '100%';
                    if (g.thumb) g.thumb.style.display = 'none';
                } else {
                    if (g.fill) g.fill.style.width = '0%';
                    if (g.thumb) g.thumb.style.display = 'none';
                }
            }
        }

        function togglePlay() {
            if (!player) return;
            const state = player.getPlayerState();
            if (state === YT.PlayerState.PLAYING) {
                player.pauseVideo();
            } else {
                player.playVideo();
            }
        }

        function toggleLoop() {
            isLooping = !isLooping;
            const btn = document.getElementById('loopBtn');
            btn.textContent = `循環: ${isLooping ? 'ON' : 'OFF'}`;
            btn.classList.toggle('btn-active', isLooping);
            updateLoopStatus();
        }

        function updateLoopStatus() {
            const el = document.getElementById('loopStatus');
            if (isLooping) {
                el.innerHTML = `循環區間: <span>${startTime.toFixed(1)}s</span> ~ <span>${endTime.toFixed(1)}s</span>`;
            } else {
                el.innerHTML = '';
            }
        }

        function jumpToStart() {
            if (!player) return;
            player.seekTo(startTime, true);
            currentBeatIndex = 0;
            if (beats.length > 0) highlightBeat(0);
        }

        function setSpeed(speed) {
            if (!player) return;
            currentSpeed = speed;
            player.setPlaybackRate(speed);
            document.querySelectorAll('.speed-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent === `${speed}x`);
            });
        }

        // ==================== Update loop ====================
        function startUpdateLoop() {
            if (updateInterval) clearInterval(updateInterval);
            updateInterval = setInterval(() => {
                if (!player || !player.getCurrentTime) return;

                const current = player.getCurrentTime();
                const duration = player.getDuration();

                if (beats.length > 0) {
                    const progress = ((current - startTime) / (endTime - startTime)) * 100;
                    document.getElementById('progressBar').style.width = Math.max(0, Math.min(100, progress)) + '%';
                } else if (duration > 0) {
                    document.getElementById('progressBar').style.width = (current / duration * 100) + '%';
                }

                const min = Math.floor(current / 60);
                const sec = (current % 60).toFixed(1);
                document.getElementById('currentTimeDisplay').textContent = `${min}:${sec.padStart(4, '0')}`;

                if (beats.length > 0) {
                    updateSliderPositions(current);

                    let closestIndex = 0;
                    for (let i = beats.length - 1; i >= 0; i--) {
                        if (current >= beats[i].time - 0.05) {
                            closestIndex = i;
                            break;
                        }
                    }
                    if (closestIndex !== currentBeatIndex) {
                        currentBeatIndex = closestIndex;
                        highlightBeat(closestIndex);
                        checkMetronome();
                        updateFullscreenBeatDisplay();
                    }
                }

                if (isLooping && current >= endTime) {
                    player.seekTo(startTime, true);
                    currentBeatIndex = 0;
                    if (beats.length > 0) highlightBeat(0);
                }
            }, 50);
        }

        document.getElementById('progressBarContainer').addEventListener('click', function(e) {
            if (!player) return;
            const rect = this.getBoundingClientRect();
            const ratio = (e.clientX - rect.left) / rect.width;
            if (beats.length > 0) {
                const time = startTime + ratio * (endTime - startTime);
                player.seekTo(time, true);
            } else {
                const time = ratio * player.getDuration();
                player.seekTo(time, true);
            }
        });

        // ==================== Config export/import (human-readable) ====================
        function exportConfig() {
            const url = document.getElementById('videoUrl').value;
            const start = parseFloat(document.getElementById('startTime').value);
            const end = parseFloat(document.getElementById('endTime').value);
            const count = parseInt(document.getElementById('beatCount').value);
            const unit = parseInt(document.getElementById('beatUnit').value);
            const unitLabel = unit === 8 ? '八拍' : '拍';

            const lines = [
                `影片: ${url}`,
                `開始: ${start}s`,
                `結束: ${end}s`,
                `拍數: ${count} 組${unitLabel}`,
                `速度: ${currentSpeed}x`
            ];
            document.getElementById('configText').value = lines.join('\n');
            document.getElementById('configText').select();
        }

        function importConfig() {
            try {
                const text = document.getElementById('configText').value.trim();
                const lines = text.split('\n');
                const config = {};

                for (const line of lines) {
                    const [key, ...rest] = line.split(':');
                    const value = rest.join(':').trim();
                    const k = key.trim();
                    if (k === '影片') config.url = value;
                    else if (k === '開始') config.start = parseFloat(value);
                    else if (k === '結束') config.end = parseFloat(value);
                    else if (k === '拍數') {
                        const match = value.match(/^(\d+)\s*組(八拍|拍)/);
                        if (match) {
                            config.count = parseInt(match[1]);
                            config.unit = match[2] === '八拍' ? 8 : 1;
                        }
                    }
                    else if (k === '速度') config.speed = parseFloat(value);
                }

                if (config.url) document.getElementById('videoUrl').value = config.url;
                if (config.start != null) document.getElementById('startTime').value = config.start;
                if (config.end != null) document.getElementById('endTime').value = config.end;
                if (config.count != null) document.getElementById('beatCount').value = config.count;
                if (config.unit != null) document.getElementById('beatUnit').value = config.unit;
                if (config.speed) setSpeed(config.speed);
                loadVideo();
                generateBeats();
            } catch (e) {
                alert('設定格式錯誤，請確認貼上的內容是否正確');
            }
        }

        // ==================== Beta: Metronome ====================
        let isMetronomeOn = false;
        let audioCtx = null;
        let lastMetronomeBeat = -1;

        function toggleMetronome() {
            isMetronomeOn = !isMetronomeOn;
            document.getElementById('metronomeBtn').textContent = `🥁 節拍器: ${isMetronomeOn ? 'ON' : 'OFF'}`;
            document.getElementById('metronomeBtn').classList.toggle('btn-active', isMetronomeOn);
            if (isMetronomeOn && !audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            lastMetronomeBeat = -1;
        }

        function playClick(isDownbeat) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = isDownbeat ? 1000 : 700;
            gain.gain.value = isDownbeat ? 0.3 : 0.15;
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.08);
        }

        function checkMetronome() {
            if (!isMetronomeOn || beats.length === 0) return;
            if (currentBeatIndex !== lastMetronomeBeat && currentBeatIndex >= 0) {
                lastMetronomeBeat = currentBeatIndex;
                const isDownbeat = beats[currentBeatIndex].beatNumber === 1;
                playClick(isDownbeat);
            }
        }

        // ==================== Keyboard shortcuts ====================
        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;

            switch (e.key) {
                case 'Escape':
                    if (isFullscreen) exitFullscreen();
                    break;
                case ' ':
                    e.preventDefault();
                    togglePlay();
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    jumpBeats(e.shiftKey ? -8 : -1);
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    jumpBeats(e.shiftKey ? 8 : 1);
                    break;
                case 'l':
                case 'L':
                    toggleLoop();
                    break;
                case 'r':
                case 'R':
                    jumpToStart();
                    break;
                case 'm':
                case 'M':
                    toggleMirror();
                    break;
                case '-':
                case '_':
                    setSpeed(Math.max(0.25, currentSpeed - 0.25));
                    break;
                case '=':
                case '+':
                    setSpeed(Math.min(2, currentSpeed + 0.25));
                    break;
            }
        });
    </script>
</body>
</html>
